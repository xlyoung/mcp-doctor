name: MCP Server Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      server_ref:
        description: "MCP server to scan (GitHub ref or npm package)"
        required: false
      fail_on_high:
        description: "Fail on high severity issues (default: true)"
        required: false
        default: "true"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MCP Doctor
        run: pip install mcpdoctor

      - name: Scan MCP server (CI mode)
        run: |
          SERVER="${{ github.event.inputs.server_ref || '' }}"
          FAIL_HIGH="${{ github.event.inputs.fail_on_high || 'true' }}"

          if [ -z "$SERVER" ]; then
            echo "::notice::No server specified, scanning current repo..."
            REPO="${{ github.repository }}"
            if [ "$FAIL_HIGH" = "true" ]; then
              mcp-doctor scan "$REPO" --ci
            else
              mcp-doctor scan "$REPO" --json || true
            fi
          else
            if [ "$FAIL_HIGH" = "true" ]; then
              mcp-doctor scan "$SERVER" --ci
            else
              mcp-doctor scan "$SERVER" --json || true
            fi
          fi

      - name: Score MCP server
        if: github.event.inputs.server_ref != ''
        run: mcp-doctor score "${{ github.event.inputs.server_ref }}" --json
